name: Update Deploy Hash

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-hash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get current commit info
        id: commit_info
        run: |
          current_hash=$(git rev-parse HEAD)
          echo "hash=$current_hash" >> $GITHUB_OUTPUT
          commit_message=$(git log -1 --pretty=format:"%s")
          echo "message=$commit_message" >> $GITHUB_OUTPUT
          echo "Current commit hash: $current_hash"
          echo "Current commit message: $commit_message"

      - name: Clone shiroi-vercel repository
        id: clone
        run: |
          if [ -n "${{ secrets.PAT }}" ]; then
            git clone https://${{ secrets.PAT }}@github.com/Bemly/shiroi-vercel.git shiroi-vercel-repo 2>/dev/null || {
              echo "shiroi-vercel repo not found, storing hash locally"
              echo "use_local=true" >> $GITHUB_OUTPUT
            }
          else
            echo "PAT not configured, storing hash locally"
            echo "use_local=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Update HASH in shiroi-vercel
        if: steps.clone.outputs.use_local != 'true'
        run: |
          cd shiroi-vercel-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.commit_info.outputs.hash }}" > HASH
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add HASH
          git commit -m "${{ steps.commit_info.outputs.message }}"
          git push origin main
          echo "Updated HASH in shiroi-vercel"

      - name: Store deploy hash locally
        if: steps.clone.outputs.use_local == 'true'
        run: |
          echo "${{ steps.commit_info.outputs.hash }}" > .deploy-hash
          git add .deploy-hash
          git commit -m "ci: update deploy-hash to ${{ steps.commit_info.outputs.hash }}" || echo "No changes"
          git push origin main
