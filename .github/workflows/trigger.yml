name: Trigger Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT secret
        id: check_pat
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "PAT secret not configured, skipping remote deploy trigger"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger remote deploy
        if: steps.check_pat.outputs.skip != 'true'
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Bemly/shiroi-remote-deploy/dispatches \
            -d '{"event_type": "trigger-workflow", "client_payload": {}}'
